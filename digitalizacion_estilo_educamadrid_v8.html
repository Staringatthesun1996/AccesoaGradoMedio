<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitalización estilo Educamadrid</title>
<style>
:root{
  --red:#d0021b; --red-dark:#a30015; --red-soft:#fff1f3; --black:#171a1f; --bg:#f4f6f8;
  --panel:#ffffff; --line:#d9dee5; --text:#1f2937; --muted:#5f6b7a; --ok:#1f9d55;
  --shadow:0 10px 26px rgba(21,26,31,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--red);text-decoration:none} a:hover{text-decoration:underline}
.header-top{background:var(--red);height:8px}
.site-header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.container{max-width:1400px;margin:0 auto;padding:0 18px}
.site-header-inner{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;padding:18px 0}
.brand{display:flex;gap:14px;align-items:flex-start}
.brand-mark{width:54px;height:54px;border-radius:16px;background:var(--red-soft);border:1px solid #ffd0d6;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--red);font-size:20px}
.brand h1{margin:0;font-size:30px;line-height:1.08;color:var(--black)}
.brand p{margin:6px 0 0;color:var(--muted);max-width:760px;line-height:1.6;font-size:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px;min-width:min(100%,560px)}
.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em}
.stat .v{margin-top:8px;font-size:22px;font-weight:800;color:var(--black)}
.stat .s{font-size:12px;color:var(--muted);margin-top:4px}
.main{padding:22px 0 36px}
.controls{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;margin-bottom:16px}
.tabs{display:flex;flex-wrap:wrap;gap:10px}
.tab{border:1px solid var(--line);background:#fff;color:var(--text);padding:12px 16px;border-radius:14px;font-weight:700;font-size:14px;cursor:pointer}
.tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.buttons{display:flex;flex-wrap:wrap;gap:10px}
.btn{border-radius:14px;padding:12px 14px;font-weight:800;font-size:14px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--text)}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff} .btn:disabled{opacity:.5;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1.18fr .82fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.card-head{padding:22px 22px 10px;border-bottom:1px solid #edf1f5}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--red-soft);color:var(--red);border:1px solid #ffd0d6;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.card-head h2{margin:14px 0 8px;font-size:28px;line-height:1.1;color:var(--black)} .card-head p{margin:0;color:var(--muted);line-height:1.7}
.content{padding:18px 22px 22px}
.section{border:1px solid #e8edf2;background:#fcfdfe;border-radius:18px;padding:16px 16px 14px;margin-bottom:14px}
.section h3{margin:0 0 10px;color:var(--black);font-size:18px} .section p{margin:0;color:var(--text);line-height:1.8;font-size:14px}
.links{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.link{display:inline-flex;gap:8px;align-items:center;border:1px solid #ffd0d6;background:var(--red-soft);color:var(--red);padding:8px 10px;border-radius:999px;font-size:12px;font-weight:700}
.sticky{position:sticky;top:108px} .test-wrap{padding:22px}
.test-head{display:flex;justify-content:space-between;align-items:start;gap:14px;margin-bottom:16px}
.pill{border:1px solid var(--line);background:#f8fafc;border-radius:12px;padding:8px 10px;font-size:13px;color:var(--muted);font-weight:700}
.timer{margin-top:8px;font-size:13px;font-weight:800;color:var(--red)}
.scroll{max-height:70vh;overflow:auto;padding-right:6px;scroll-behavior:auto}
.question{border:1px solid #e8edf2;border-radius:18px;background:#fcfdfe;padding:15px;margin-bottom:12px}
.question-title{margin:0 0 12px;font-size:14px;font-weight:800;line-height:1.6}
.opts{display:grid;gap:8px}
.opt{width:100%;text-align:left;border:1px solid var(--line);background:#fff;padding:11px 12px;border-radius:14px;cursor:pointer;font-size:14px;color:var(--text)}
.opt:hover{border-color:#c6ced8}
.opt.selected{border-color:#f3a0ac;background:#fff6f7}
.opt.correct{border-color:#9ad8b3;background:#ecfaf2}
.opt.wrong{border-color:#efb2b2;background:#fff1f1}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.result-box{margin-top:14px;border:1px solid #bde5cb;background:#ecfaf2;border-radius:16px;padding:14px}
.result-box h4{margin:0 0 8px;color:var(--ok)}
.report-box{margin-top:16px;border:2px solid #d0aa00;background:#fff36d;border-radius:16px;padding:14px}
.report-box h4{margin:0 0 10px;color:#5f4900;font-size:18px}
.report-list{display:grid;gap:10px}
.report-item{border:1px solid #dcc64b;border-radius:14px;background:#fffbe0;padding:12px}
.report-item p{margin:0 0 8px;font-size:13px;line-height:1.6}
.report-tags{display:flex;flex-wrap:wrap;gap:8px}
.report-tag{display:inline-flex;align-items:center;border:1px solid #d0aa00;background:#fff7ad;color:#5f4900;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:700}.mastery-box{margin-top:14px;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff}.mastery-title{font-size:13px;font-weight:800;margin-bottom:6px}.mastery-badge{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800}.mastery-low{background:#fff1f1;color:#a12b2b;border:1px solid #efb2b2}.mastery-mid{background:#fff8e1;color:#8a6d00;border:1px solid #e9d27a}.mastery-high{background:#ecfaf2;color:#1f9d55;border:1px solid #bde5cb}.practice-box{margin-top:14px;border:1px dashed #d0aa00;background:#fffbe0;border-radius:16px;padding:14px}.practice-box h4{margin:0 0 10px;color:#5f4900;font-size:17px}.practice-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-track{height:10px;background:#eef2f6;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red-dark),var(--red));border-radius:999px}
.hidden{display:none} .results-grid{display:grid;gap:16px;grid-template-columns:repeat(2,minmax(0,1fr))}
.res-card{padding:18px} .badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.badge.ok{background:#ecfaf2;color:var(--ok);border:1px solid #bde5cb} .badge.pending{background:#f8fafc;color:var(--muted);border:1px solid var(--line)}
.score-big{font-size:52px;font-weight:900;color:var(--black)} .score-big span{color:var(--muted)} .small{font-size:13px;color:var(--muted);line-height:1.7} .footer-note{margin-top:18px;color:var(--muted);font-size:12px}
@media (max-width:1120px){.grid{grid-template-columns:1fr}.sticky{position:static}}
@media (max-width:860px){.site-header-inner,.controls{display:grid;grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,minmax(0,1fr));min-width:0}.results-grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header-top"></div>
<header class="site-header">
  <div class="container site-header-inner">
    <div class="brand">
      <div class="brand-mark">ED</div>
      <div>
        <h1>Preparación de Digitalización · 4 bloques</h1>
        <p>Web de estudio con contenido completo, enlaces por apartado, tests ampliados, autocorrección, temporizador, guardado local y panel final de resultados. Estética institucional inspirada en EducaMadrid.</p>
      </div>
    </div>
    <div class="stat-grid" id="summaryMini"></div>
  </div>
</header>

<main class="container main">
  <div class="controls">
    <div class="tabs" id="tabs"></div>
    <div class="buttons">
      <button class="btn" id="btnResetBlock">Reiniciar bloque</button>
      <button class="btn" id="btnExportCSV">Exportar CSV</button>
      <button class="btn" id="btnPrint">Exportar PDF</button>
      <button class="btn primary" id="btnResetAll">Reiniciar todo</button>
    </div>
  </div>
  <section id="blockView" class="grid"></section>
  <section id="resultsView" class="hidden"></section>
</main>

<script>
const blocks = [{"id": "b1", "short": "Bloque 1", "title": "Información y alfabetización digital", "icon": "🔎", "timerMinutes": 18, "intro": "Este bloque prepara al alumnado para realizar búsquedas eficaces, comprender cómo funcionan los buscadores, distinguir resultados fiables y aplicar operadores de búsqueda con precisión.", "sections": [{"title": "Qué significa buscar bien en Internet", "content": "Buscar bien en Internet no consiste en escribir muchas palabras, sino en saber localizar información relevante, fiable y adecuada a una necesidad concreta. Una buena búsqueda parte de una intención clara, se formula con palabras clave precisas y se ajusta usando operadores para evitar ruido informativo.", "links": [{"label": "Google Search Help", "url": "https://support.google.com/websearch/?hl=es"}, {"label": "INCIBE", "url": "https://www.incibe.es/"}]}, {"title": "Buscador, navegador y tipos de buscadores", "content": "Es importante distinguir buscador y navegador. El navegador permite abrir páginas web y el buscador localiza información dentro de la Red. Además, existen buscadores generales, otros centrados en privacidad y herramientas que agregan resultados. En examen suelen confundir Google con Chrome, y esta distinción debe quedar muy clara.", "links": [{"label": "Wikipedia: motor de búsqueda", "url": "https://es.wikipedia.org/wiki/Motor_de_b%C3%BAsqueda"}, {"label": "DuckDuckGo", "url": "https://duckduckgo.com/"}]}, {"title": "Palabras clave y formulación de consultas", "content": "Las palabras clave son términos breves y concretos que resumen lo que se quiere encontrar. Una búsqueda eficaz reduce frases ambiguas y prioriza conceptos centrales. Cuanto más precisa es la consulta, mayor relevancia tendrán los resultados. En el contexto escolar, buscar por conceptos específicos evita abrir páginas poco útiles.", "links": [{"label": "Google: cómo buscar", "url": "https://support.google.com/websearch/answer/134479?hl=es"}]}, {"title": "Operadores de búsqueda imprescindibles", "content": "Las comillas permiten localizar una frase exacta. El operador site: limita la búsqueda a un dominio o web concreta, como por ejemplo un sitio institucional. El signo menos sirve para excluir términos no deseados. El operador filetype: ayuda a localizar archivos concretos, como PDF. Estos recursos son básicos para resolver preguntas de examen con precisión.", "links": [{"label": "Operadores avanzados", "url": "https://support.google.com/websearch/answer/2466433?hl=es"}]}, {"title": "Fiabilidad de los resultados y lectura crítica", "content": "No todos los resultados que aparecen en un buscador tienen la misma calidad. Antes de elegir una fuente conviene observar el título, la URL, el resumen, la autoría, la fecha de actualización y la intención de la página. Los resultados patrocinados o llamativos no siempre son los más adecuados para estudiar.", "links": [{"label": "INCIBE Ciudadanía", "url": "https://www.incibe.es/ciudadania"}, {"label": "Wikipedia: alfabetización informacional", "url": "https://es.wikipedia.org/wiki/Alfabetizaci%C3%B3n_informacional"}]}, {"title": "Aplicación al examen", "content": "Si la pregunta exige una frase exacta, la respuesta correcta suele implicar comillas. Si pide resultados de una web oficial, suele aparecer site:. Si se deben eliminar resultados no deseados, hay que pensar en el signo menos. Además, cuando una cuestión habla de rendimiento de un equipo, no hay que dejarse distraer por el diseño exterior o el tamaño del monitor.", "links": []}], "questions": [["¿Cuál es el objetivo principal de una búsqueda eficaz en Internet?", ["Encontrar muchas páginas web", "Encontrar información rápida sin importar su calidad", "Encontrar información relevante y fiable en poco tiempo", "Copiar información directamente"], 2], ["¿Qué es Google?", ["Un navegador web", "Un motor de búsqueda", "Una red social", "Un sistema operativo"], 1], ["¿Cuál de los siguientes es otro motor de búsqueda?", ["Microsoft Word", "Bing", "WhatsApp", "Excel"], 1], ["¿Qué tipo de buscador destaca por ofrecer mayor privacidad?", ["Google", "Bing", "DuckDuckGo", "Yahoo"], 2], ["¿Qué son las palabras clave?", ["Frases largas sin sentido", "Palabras irrelevantes", "Términos concretos que describen lo que buscas", "Direcciones web"], 2], ["¿Cuál es la mejor búsqueda?", ["cosas inteligencia", "trabajo ia", "impacto inteligencia artificial empleo", "hola inteligencia artificial"], 2], ["¿Para qué sirven las comillas en una búsqueda?", ["Traducir palabras", "Buscar una frase exacta", "Eliminar resultados", "Buscar imágenes"], 1], ["¿Qué hace el operador site:?", ["Traduce páginas", "Limita la búsqueda a un sitio web concreto", "Elimina resultados", "Busca vídeos"], 1], ["¿Qué operador usarías para excluir una palabra?", ["+", "*", "-", "/"], 2], ["¿Qué operador permite buscar archivos PDF?", ["site:", "filetype:", "pdf:", "doc:"], 1], ["¿Cuál de las siguientes búsquedas está mejor formulada?", ["inteligencia artificial", "\"impacto de la inteligencia artificial\" site:gob.es", "ia cosas", "buscar ia"], 1], ["¿Qué debes hacer antes de elegir un resultado?", ["Abrir el primero siempre", "Mirar título, URL y descripción", "Descargarlo directamente", "Compartirlo"], 1], ["¿Cómo se identifica un anuncio en los resultados?", ["No se puede identificar", "Aparece como “Anuncio”", "Tiene más texto", "Tiene menos texto"], 1], ["¿Cuál de estos dominios suele ser más fiable?", [".com", ".random", ".gob", ".net"], 2], ["¿Qué indica que una web es segura?", ["www.", "http://", "https://", ".com"], 2], ["¿Cuál es una señal de que una web NO es fiable?", ["Tiene autor", "Tiene fuentes", "Tiene muchas faltas de ortografía", "Está actualizada"], 2], ["¿Qué debes evitar al usar información de Internet?", ["Leerla", "Analizarla", "Copiar y pegar sin entender", "Compararla"], 2], ["¿Qué debes hacer al usar información de otra web?", ["Decir que es tuya", "Ignorar al autor", "Citar la fuente", "Modificarla sin permiso"], 2], ["¿Qué búsqueda excluye correctamente una palabra?", ["inteligencia artificial robots", "inteligencia artificial +robots", "inteligencia artificial -robots", "inteligencia artificial /robots"], 2], ["¿Cuál es el mayor error al buscar en Internet?", ["Usar operadores", "Revisar fuentes", "Elegir el primer resultado sin comprobarlo", "Comparar información"], 2]]}, {"id": "b2", "short": "Bloque 2", "title": "Comunicación y colaboración", "icon": "💬", "timerMinutes": 20, "intro": "Este bloque desarrolla el uso seguro y eficaz del correo electrónico, los permisos de acceso, la netiqueta y la colaboración simultánea en la nube.", "sections": [{"title": "Correo electrónico como herramienta formal", "content": "El correo electrónico es una herramienta básica de comunicación académica y profesional. Sus campos principales cumplen funciones distintas: el destinatario principal recibe el mensaje en el campo Para, CC envía una copia visible y CCO oculta las direcciones al resto de receptores. En contextos escolares y administrativos, usar correctamente estos campos forma parte de la competencia digital.", "links": [{"label": "Gmail: CC y CCO", "url": "https://support.google.com/mail/answer/22370?hl=es"}, {"label": "INCIBE", "url": "https://www.incibe.es/"}]}, {"title": "Privacidad y protección de datos en el correo", "content": "Cuando se envía un correo a muchas personas, mostrar todas las direcciones puede exponer datos personales de forma innecesaria. El uso de CCO reduce ese riesgo porque oculta la lista de destinatarios y protege mejor la privacidad. Esta decisión no solo es correcta técnicamente, sino también ética y legalmente razonable.", "links": [{"label": "AEPD", "url": "https://www.aepd.es/"}, {"label": "INCIBE Ciudadanía", "url": "https://www.incibe.es/ciudadania"}]}, {"title": "Permisos en documentos compartidos", "content": "Las herramientas en la nube permiten asignar niveles diferentes de acceso. Solo lectura permite consultar el archivo, comentario permite sugerir cambios y edición permite modificar el contenido. Saber repartir estos permisos es fundamental para evitar errores, pérdidas de información o cambios no deseados.", "links": [{"label": "Google Docs: compartir", "url": "https://support.google.com/docs/answer/2494822?hl=es"}, {"label": "Google Drive", "url": "https://workspace.google.com/intl/es/products/drive/"}]}, {"title": "Trabajo colaborativo en la nube", "content": "La edición en la nube permite que varias personas trabajen en un mismo archivo al mismo tiempo desde lugares distintos. Sus ventajas incluyen guardado automático, historial de versiones, acceso multiplataforma y reducción de duplicados. En el aula, esto facilita el trabajo cooperativo y la supervisión docente.", "links": [{"label": "Google Docs", "url": "https://workspace.google.com/intl/es/products/docs/"}, {"label": "Microsoft 365", "url": "https://www.microsoft.com/es-es/microsoft-365"}]}, {"title": "Netiqueta en videoconferencias", "content": "La netiqueta reúne normas de cortesía y convivencia digital. En una videoconferencia, silenciar el micrófono mientras no se habla, respetar turnos, evitar escribir en mayúsculas y no grabar sin consentimiento son pautas básicas para mantener un entorno de trabajo ordenado y respetuoso.", "links": [{"label": "INCIBE Menores", "url": "https://www.incibe.es/menores"}, {"label": "Google Meet", "url": "https://support.google.com/meet/?hl=es"}]}, {"title": "Aplicación al examen", "content": "Si una pregunta plantea privacidad en correos masivos, CCO es la opción correcta. Si el profesor necesita corregir o escribir sobre un documento, necesita edición. Si el resto del alumnado solo debe consultarlo, necesita lectura. Si se pregunta por trabajo simultáneo, la respuesta correcta suele ser edición en la nube. Si se plantea comportamiento adecuado en videollamadas, la referencia básica es la netiqueta.", "links": []}], "questions": [["¿Qué campo del correo electrónico permite enviar un mensaje ocultando las direcciones de otros destinatarios?", ["Para", "CC", "CCO", "Asunto"], 2], ["¿Qué significa CCO en un correo electrónico?", ["Copia compartida obligatoria", "Copia de carbón oculta", "Correo con copia oficial", "Control de copia online"], 1], ["¿Cuál es el uso correcto del campo CC?", ["Ocultar destinatarios", "Enviar copia visible a otros destinatarios", "Enviar mensajes privados", "Eliminar destinatarios"], 1], ["¿Qué permiso permite modificar un documento en la nube?", ["Solo lectura", "Comentario", "Edición", "Bloqueo"], 2], ["¿Qué permiso permite ver un documento sin modificarlo?", ["Solo lectura", "Edición", "Comentario", "Propietario"], 0], ["¿Qué herramienta permite trabajar en un documento al mismo tiempo desde diferentes lugares?", ["Correo electrónico", "Almacenamiento local", "Edición en la nube", "Compresión"], 2], ["¿Qué es la netiqueta?", ["Un programa de edición", "Normas de comportamiento en Internet", "Un tipo de correo", "Un virus informático"], 1], ["¿Qué norma es correcta en una videoconferencia?", ["Hablar todos a la vez", "Grabar sin permiso", "Mantener el micrófono apagado si no se habla", "Escribir siempre en mayúsculas"], 2], ["¿Qué riesgo existe al grabar una videoconferencia sin permiso?", ["Mejora la calidad del vídeo", "Afecta a la privacidad de los participantes", "Reduce el sonido", "No tiene consecuencias"], 1], ["¿Qué permite el trabajo en la nube?", ["Solo guardar archivos", "Trabajar sin conexión", "Compartir y colaborar en documentos en tiempo real", "Eliminar archivos automáticamente"], 2], ["¿Qué plataforma permite crear documentos colaborativos?", ["Calculadora", "Google Docs", "Bloc de notas", "Paint"], 1], ["¿Qué ocurre si das permiso de edición a todos los usuarios?", ["Nadie puede ver el documento", "Todos pueden modificar el contenido", "Solo el profesor puede editar", "El documento se bloquea"], 1], ["¿Qué es la privacidad digital?", ["Compartir datos libremente", "Proteger la información personal en Internet", "Eliminar archivos", "Usar redes sociales"], 1], ["¿Qué debes evitar al enviar correos masivos?", ["Usar asunto", "Mostrar direcciones de otros destinatarios", "Escribir el mensaje", "Adjuntar archivos"], 1], ["¿Qué herramienta se usa para videoconferencias?", ["Excel", "Google Meet", "Word", "Paint"], 1], ["¿Qué es un documento compartido?", ["Un archivo privado", "Un archivo accesible por varias personas", "Un documento bloqueado", "Un archivo eliminado"], 1], ["¿Qué ventaja tiene la edición en la nube?", ["No se guarda el trabajo", "Permite trabajar en grupo en tiempo real", "Solo funciona sin Internet", "Es más lenta"], 1], ["¿Qué acción respeta la netiqueta?", ["Interrumpir constantemente", "Esperar turno de palabra", "Usar mayúsculas siempre", "Ignorar a otros"], 1], ["¿Qué sucede si no configuras permisos correctamente?", ["El documento desaparece", "Pueden acceder personas no deseadas", "Se borra automáticamente", "Se vuelve privado"], 1], ["¿Qué es una videoconferencia?", ["Un correo electrónico", "Comunicación en tiempo real con audio y vídeo", "Un archivo", "Una red social"], 1], ["¿Qué herramienta permite enviar mensajes formales?", ["Correo electrónico", "Chat informal", "Red social", "Juego online"], 0], ["¿Qué significa trabajar colaborativamente?", ["Trabajar solo", "Trabajar en grupo en un mismo documento", "Eliminar archivos", "No compartir información"], 1], ["¿Qué debes hacer antes de grabar una reunión online?", ["Nada", "Pedir permiso", "Apagar cámara", "Cerrar sesión"], 1], ["¿Qué tipo de permiso permite sugerir cambios?", ["Solo lectura", "Comentario", "Edición", "Bloqueo"], 1], ["¿Qué ocurre en la edición en tiempo real?", ["Se borra el documento", "Los cambios se ven al instante", "No se guardan cambios", "Se bloquea el archivo"], 1], ["¿Qué herramienta permite compartir archivos en la nube?", ["Calculadora", "Google Drive", "Bloc de notas", "Paint"], 1], ["¿Qué acción mejora la comunicación digital?", ["Ignorar mensajes", "Usar lenguaje claro y respetuoso", "Escrib ive Commons", "content": "Las licencias Creative Commons permiten compartir obras bajo condiciones definidas. CC BY exige atribución y CC BY-NC añade la limitación de no usar la obra con fines comerciales. En el ámbito escolar, usar una canción o imagen con licencia no significa apropiársela, sino respetar la autoría y las condiciones marcadas por la licencia.", "links": [{"label": "Creative Commons", "url": "https://creativecommons.org/"}, {"label": "CC BY-NC", "url": "https://creativecommons.org/licenses/by-nc/4.0/deed.es"}, {"label": "Wikipedia: Creative Commons", "url": "https://es.wikipedia.org/wiki/Creative_Commons"}]}, {"title": "Edición de vídeo y línea de tiempo", "content": "La edición de vídeo consiste en organizar clips, recortar partes innecesarias, ajustar audio, aplicar transiciones y preparar un archivo final. La línea de tiempo es la herramienta central de ese proceso porque permite ordenar secuencialmente los fragmentos y eliminar lo que no se utilizará. Renderizar significa exportar o generar el vídeo final, no organizar el montaje.", "links": [{"label": "Kdenlive", "url": "https://kdenlive.org/es/"}, {"label": "Wikipedia: edición de vídeo", "url": "https://es.wikipedia.org/wiki/Edici%C3%B3n_de_video"}]}, {"title": "Software libre y software propietario", "content": "El software libre permite acceder al código fuente, modificarlo y compartirlo conforme a la licencia. El software propietario mantiene el código cerrado y restringe esas posibilidades. La diferencia principal no es si el programa cuesta dinero o no, sino el grado de libertad que ofrece sobre su funcionamiento interno.", "links": [{"label": "Wikipedia: software libre", "url": "https://es.wikipedia.org/wiki/Software_libre"}, {"label": "Wikipedia: software propietario", "url": "https://es.wikipedia.org/wiki/Software_propietario"}]}, {"title": "Herramientas reales: Inkscape y Kdenlive", "content": "Inkscape es una herramienta de diseño vectorial de código abierto, útil para crear logotipos y gráficos escalables. Kdenlive es un editor de vídeo libre de tipo no lineal que trabaja con línea de tiempo y varias pistas. Ambos son ejemplos muy adecuados para explicar qué es software libre aplicado a tareas creativas reales.", "links": [{"label": "Inkscape", "url": "https://inkscape.app/es/"}, {"label": "Kdenlive", "url": "https://kdenlive.org/es/"}, {"label": "INCIBE", "url": "https://www.incibe.es/"}]}, {"title": "Aplicación al examen", "content": "Si la pregunta plantea transparencia en un logotipo, la respuesta correcta es PNG. Si aparece una licencia CC BY-NC, la clave es atribución y no comercial. Si se pide la técnica de organizar secuencialmente clips y eliminar partes, se debe pensar en línea de tiempo. Si se compara software libre y propietario, hay que mirar la libertad de acceso y modificación del código.", "links": []}], "questions": [["¿Qué formato de imagen permite fondo transparente?", [".jpg", ".png", ".mp3", ".raw"], 1], ["¿Cuál es la principal ventaja del formato PNG?", ["Menor calidad", "Permite transparencia", "Menor tamaño siempre", "Solo para audio"], 1], ["¿Qué formato se usa normalmente para fotografías?", [".jpg", ".png", ".mp3", ".svg"], 0], ["¿Qué significa la licencia CC BY?", ["Uso comercial prohibido", "Obligación de citar al autor", "Prohibido modificar", "Uso privado únicamente"], 1], ["¿Qué implica la licencia CC BY-NC?", ["Uso libre sin condiciones", "Debe citarse al autor y no usar con fines comerciales", "No se puede usar", "Solo para empresas"], 1], ["¿Qué significa NC en Creative Commons?", ["No copiar", "No comercial", "No compartir", "No cambiar"], 1], ["¿Qué es Creative Commons?", ["Un programa de edición", "Un sistema de licencias", "Un navegador", "Un antivirus"], 1], ["¿Qué debes hacer al usar contenido con licencia CC?", ["Ignorar autor", "Citar al autor", "Eliminar datos", "Modificar sin permiso"], 1], ["¿Qué herramienta es software libre de diseño vectorial?", ["Inkscape", "Photoshop", "Word", "Excel"], 0], ["¿Qué tipo de gráficos usa Inkscape?", ["Mapas de bits", "Vectoriales", "Audio", "Vídeo"], 1], ["¿Qué herramienta es software libre de edición de vídeo?", ["Kdenlive", "PowerPoint", "Paint", "Bloc de notas"], 0], ["¿Qué es la línea de tiempo en edición de vídeo?", ["Exportar vídeo", "Organizar clips", "Grabar audio", "Añadir texto"], 1], ["¿Qué acción consiste en generar el vídeo final?", ["Renderizar", "Editar", "Recortar", "Mezclar"], 0], ["¿Qué permite la edición de vídeo?", ["Solo ver vídeos", "Crear contenido audiovisual", "Eliminar archivos", "Enviar correos"], 1], ["¿Qué es software libre?", ["Siempre de pago", "Permite modificar y compartir código", "Sin licencia", "Solo para expertos"], 1], ["¿Qué caracteriza al software propietario?", ["Código abierto", "Código cerrado", "Libre uso", "Modificable"], 1], ["¿Qué formato es profesional en fotografía?", [".jpg", ".png", ".raw", ".gif"], 2], ["¿Qué debes evitar al usar contenido de internet?", ["Leer", "Analizar", "No respetar derechos de autor", "Comparar"], 2], ["¿Qué ocurre si no citas al autor?", ["Nada", "Incumples la licencia", "Mejora el contenido", "Se elimina archivo"], 1], ["¿Qué significa SA en Creative Commons?", ["Sin autor", "Compartir igual", "Solo audio", "Sin acceso"], 1], ["¿Qué significa ND en Creative Commons?", ["No descargar", "No obras derivadas", "No digital", "No directo"], 1], ["¿Qué permite un editor de vídeo como Kdenlive?", ["Solo escribir", "Editar clips y audio", "Enviar emails", "Navegar"], 1], ["¿Qué es un gráfico vectorial?", ["Imagen pixelada", "Imagen escalable sin perder calidad", "Archivo de audio", "Vídeo"], 1], ["¿Qué ocurre al ampliar un JPG?", ["Mejora calidad", "Pierde calidad", "Se convierte en PNG", "No cambia"], 1], ["¿Qué herramienta es mejor para logos?", ["JPG", "PNG", "MP3", "TXT"], 1], ["¿Qué es exportar un vídeo?", ["Editar", "Guardar versión final", "Eliminar clips", "Grabar audio"], 1], ["¿Qué es un clip de vídeo?", ["Un programa", "Fragmento de vídeo", "Un archivo de texto", "Una imagen"], 1], ["¿Qué es una transición?", ["Eliminar vídeo", "Efecto entre clips", "Audio", "Texto"], 1], ["¿Qué debes hacer antes de usar música online?", ["Nada", "Revisar licencia", "Copiar", "Modificar"], 1], ["¿Qué acción es correcta en creación digital?", ["Plagiar contenido", "Citar fuentes y respetar licencias", "Ignorar autor", "Modificar sin permiso"], 1]]}, {"id": "b4", "short": "Bloque 4", "title": "Resolución de problemas", "icon": "🛠️", "timerMinutes": 20, "intro": "Este bloque desarrolla un protocolo razonado de diagnóstico: empezar por soluciones simples, mantener el equipo actualizado y decidir cuándo reparar, cuándo pedir ayuda y cómo evitar sustituciones innecesarias.", "sections": [{"title": "Protocolo básico de resolución de problemas", "content": "Ante un problema técnico sencillo, lo correcto es seguir una secuencia lógica. Primero se observan síntomas, después se prueban soluciones simples y reversibles, como cerrar y abrir de nuevo una aplicación o reiniciar el dispositivo. Saltar directamente a medidas extremas suele ser ineficaz y puede empeorar el problema.", "links": [{"label": "INCIBE", "url": "https://www.incibe.es/"}, {"label": "Wikipedia: solución de problemas", "url": "https://es.wikipedia.org/wiki/Resoluci%C3%B3n_de_problemas"}]}, {"title": "Reiniciar como primer paso lógico", "content": "Muchas incidencias se producen por bloqueos temporales, conflictos entre procesos o saturación de memoria. Reiniciar permite cerrar tareas bloqueadas y devolver el sistema a un estado más limpio. Por eso, en dispositivos y aplicaciones, reiniciar es una primera medida razonable antes de pasar a intervenciones más complejas.", "links": [{"label": "Xataka", "url": "https://www.xataka.com/"}, {"label": "Wikipedia: reinicio", "url": "https://es.wikipedia.org/wiki/Reinicio"}]}, {"title": "Mantenimiento y actualización del sistema", "content": "Mantener el sistema actualizado ayuda a corregir errores, mejorar compatibilidad y reducir vulnerabilidades. El mantenimiento preventivo incluye también limpieza física, control del polvo y revisión del funcionamiento general. Estas acciones prolongan la vida útil del equipo y reducen la necesidad de sustituciones innecesarias.", "links": [{"label": "INCIBE: actualizar el sistema", "url": "https://www.incibe.es/ciudadania/tematicas/configuraciones-dispositivos/como-actualizar-el-sistema-de-tus-dispositivos"}, {"label": "Xataka", "url": "https://www.xataka.com/"}]}, {"title": "Obsolescencia programada y consumo responsable", "content": "La obsolescencia programada se refiere a la estrategia de diseñar productos con una vida útil limitada para acelerar su reemplazo. Comprender este concepto ayuda a valorar reparación, mantenimiento, ampliación de memoria, cambios de batería o pequeñas mejoras antes de comprar un dispositivo nuevo.", "links": [{"label": "Wikipedia: obsolescencia programada", "url": "https://es.wikipedia.org/wiki/Obsolescencia_programada"}, {"label": "Xataka", "url": "https://www.xataka.com/"}]}, {"title": "Cuándo acudir a soporte técnico o foros especializados", "content": "Si las comprobaciones básicas no resuelven el problema, conviene consultar soporte técnico oficial o comunidades especializadas fiables. Esto permite encontrar procedimientos concretos, advertencias de seguridad y soluciones contrastadas. Probar medidas aleatorias o golpear el equipo no es un método técnico válido.", "links": [{"label": "INCIBE 017", "url": "https://www.incibe.es/linea-de-ayuda-en-ciberseguridad"}, {"label": "INCIBE Ciudadanía", "url": "https://www.incibe.es/ciudadania"}]}, {"title": "Aplicación al examen", "content": "Si una aplicación no responde, el primer paso lógico es reiniciar la aplicación o el dispositivo. Si se pregunta por una estrategia de vida útil limitada para obligar a comprar, la expresión correcta es obsolescencia programada. Si la cuestión busca una acción que prolongue la vida del ordenador, lo adecuado es mantenerlo actualizado. Si no se logra resolver el problema, la mejor opción es acudir a soporte oficial o foros especializados.", "links": []}], "questions": [["¿Cuál es el primer paso lógico si una aplicación no responde?", ["Comprar un dispositivo nuevo", "Reiniciar la aplicación o el dispositivo", "Llamar a un técnico inmediatamente", "Formatear el disco duro"], 1], ["¿Qué acción suele resolver fallos temporales del sistema?", ["Actualizar hardware", "Reiniciar el dispositivo", "Comprar otro equipo", "Eliminar archivos"], 1], ["¿Qué es la obsolescencia programada?", ["Mejorar productos continuamente", "Reciclar dispositivos", "Fabricar productos con vida útil limitada", "Actualizar software"], 2], ["¿Qué objetivo tiene la obsolescencia programada?", ["Mejorar rendimiento", "Reducir costes", "Fomentar la compra de nuevos productos", "Aumentar seguridad"], 2], ["¿Qué acción ayuda a prolongar la vida útil del ordenador?", ["Actualizar el sistema", "No actualizar nunca", "Golpear el dispositivo", "Apagar constantemente"], 0], ["¿Qué ocurre si no actualizas el sistema?", ["Mejora rendimiento", "Puede tener fallos y vulnerabilidades", "Se vuelve más rápido", "No cambia nada"], 1], ["¿Qué es una actualización de software?", ["Eliminar archivos", "Mejora del sistema y corrección de errores", "Instalar virus", "Borrar datos"], 1], ["¿Qué acción NO es recomendable para cuidar un ordenador?", ["Actualizar sistema", "Limpiar ventiladores", "Dejar acumular polvo", "Revisar software"], 2], ["¿Qué debes hacer si no solucionas un problema básico?", ["Probar al azar", "Consultar soporte técnico o foros especializados", "Golpear el dispositivo", "Ignorar el problema"], 1], ["¿Qué tipo de fuente es más fiable para resolver problemas?", ["Comentarios anónimos", "Soporte oficial", "Redes sociales", "Publicidad"], 1], ["¿Qué es un fallo temporal del sistema?", ["Error permanente", "Problema que se soluciona al reiniciar", "Virus", "Hardware roto"], 1], ["¿Qué puede causar lentitud en un ordenador?", ["Actualizar sistema", "Acumulación de archivos o procesos", "Reiniciar", "Cerrar programas"], 1], ["¿Qué es mantenimiento preventivo?", ["Arreglar fallos graves", "Acciones para evitar problemas futuros", "Comprar equipos", "Eliminar programas"], 1], ["¿Qué incluye el mantenimiento preventivo?", ["Golpear componentes", "Actualizar y limpiar el sistema", "Desinstalar todo", "Formatear cada día"], 1], ["¿Qué es soporte técnico?", ["Venta de productos", "Ayuda especializada para resolver problemas", "Publicidad", "Un programa"], 1], ["¿Qué es un foro especializado?", ["Red social general", "Espacio donde usuarios comparten soluciones técnicas", "Correo electrónico", "Blog personal"], 1], ["¿Qué problema puede causar no limpiar el ordenador?", ["Mejor rendimiento", "Sobrecalentamiento", "Mayor velocidad", "Menor consumo"], 1], ["¿Qué es diagnóstico de problemas?", ["Ignorar errores", "Identificar la causa de un fallo", "Eliminar archivos", "Comprar equipo"], 1], ["¿Qué acción es correcta ante un fallo técnico?", ["Actuar sin pensar", "Seguir un proceso lógico de resolución", "Golpear el equipo", "Comprar otro"], 1], ["¿Qué es una solución técnica adecuada?", ["Aleatoria", "Basada en análisis del problema", "Rápida sin pensar", "Costosa siempre"], 1], ["¿Qué puede indicar que un problema es de hardware?", ["Se soluciona reiniciando", "El dispositivo no enciende", "Se cierra una app", "Va lento ocasionalmente"], 1], ["¿Qué es hardware?", ["Programas", "Componentes físicos del equipo", "Internet", "Aplicaciones"], 1], ["¿Qué es software?", ["Programas del sistema", "Componentes físicos", "Pantalla", "Teclado"], 0], ["¿Qué acción es adecuada antes de llamar a un técnico?", ["Intentar soluciones básicas", "Comprar otro equipo", "Ignorar el problema", "Formatear directamente"], 0], ["¿Qué es una solución extrema?", ["Reiniciar", "Formatear sin comprobar otras opciones", "Actualizar", "Cerrar apps"], 1], ["¿Qué ocurre si pruebas soluciones al azar?", ["Mejora sistema", "Puede empeora const STORAGE_KEY = "digitalizacion_educamadrid_style_v8";

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return clone(initialState);
    const saved = JSON.parse(raw);
    const merged = Object.assign(clone(initialState), saved); if(typeof merged.practiceMode === "undefined") merged.practiceMode = null; return merged;
  } catch(e) {
    return clone(initialState);
  }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getBlock(id) { return blocks.find(b => b.id === id); }
function scoreBlock(id) {
  const b = getBlock(id);
  return state.answers[id].reduce((acc, ans, i) => acc + (ans === b.questions[i][2] ? 1 : 0), 0);
}
function answeredCount(id) { return state.answers[id].filter(v => v !== null).length; }
function pct(v, t) { return t ? Math.round((v / t) * 100) : 0; }
function fmt(ms) {
  if(!ms || ms < 0) return "00:00";
  const total = Math.floor(ms / 1000);
  const m = String(Math.floor(total / 60)).padStart(2, "0");
  const s = String(total % 60).padStart(2, "0");
  return m + ":" + s;
}
function ensureStarted(id) {
  if(!state.startedAt[id]) {
    state.startedAt[id] = Date.now();
    saveState();
  }
}
function remainingMs(id) {
  const b = getBlock(id);
  const start = state.startedAt[id];
  if(!start) return b.timerMinutes * 60 * 1000;
  return Math.max(0, start + b.timerMinutes * 60 * 1000 - Date.now());
}
function linksHTML(links) {
  if(!links || !links.length) return "";
  return '<div class="links">' + links.map(l => '<a class="link" href="' + l.url + '" target="_blank" rel="noopener noreferrer">↗ ' + l.label + '</a>').join('') + '</div>';
}
function getIncorrectQuestions(id) {
  const b = getBlock(id);
  return b.questions.map((q, i) => ({ index:i, text:q[0], selected:state.answers[id][i], correct:q[2] }))
    .filter(item => item.selected !== null && item.selected !== item.correct);
}
function getReviewAreas(id) {
  const areas = new Set();
  getIncorrectQuestions(id).forEach(item => ((reviewMap[id] && reviewMap[id][item.index]) || []).forEach(a => areas.add(a)));
  return Array.from(areas);
}
function blockReportHTML(id) {
  const incorrect = getIncorrectQuestions(id);
  if(!incorrect.length) {
    return '<div class="report-box"><h4>Informe de repaso</h4><div>No hay fallos en este bloque. Puedes continuar con el siguiente.</div></div>';
  }

  incorrect.forEach(item => {
    const tags = ((reviewMap[id] && reviewMap[id][item.index]) || []).map(area => '<span class="report-tag">' + area + '</span>').join('');
    html += '<div class="report-item"><p><strong>Cuestión fallada:</strong> ' + item.text + '</p><div class="report-tags">' + (tags || '<span class="report-tag">Repasar bloque completo</span>') + '</div></div>';
  });
  html += '</div></div>';
  return html;
}

    const btn = document.createElement("button");
    btn.className = "tab" + (state.activeTab === id ? " active" : "");
    btn.textContent = label;
    btn.onclick = () => {
      if(state.practiceMode && id !== state.practiceMode.blockId) state.practiceMode = null;
      state.activeTab = id;
      if(id !== "results") ensureStarted(id);
      saveState();
      render();
    };
    tabsEl.appendChild(btn);
  });
}

function renderMiniSummary() {
  summaryMini.innerHTML = "";

    const el = document.createElement("div");
    el.className = "stat";
    el.innerHTML = '<div class="k">B' + (i+1) + '</div><div class="v">' + scoreBlock(b.id) + '/' + b.questions.length + '</div><div class="s">' + (state.checked[b.id] ? "Corregido" : answeredCount(b.id) + " respondidas") + '</div>';
    summaryMini.appendChild(el);
  });
}


function masteryInfo(id) {
  const b = getBlock(id);
  const percentage = pct(scoreBlock(id), b.questions.length);
  if (percentage < 50) return {label:'Necesita refuerzo', cls:'mastery-badge mastery-low', text:'Conviene repasar los conceptos básicos de este bloque antes de seguir avanzando.'};
  if (percentage < 75) return {label:'En proceso', cls:'mastery-badge mastery-mid', text:'Hay una base aceptable, pero todavía conviene reforzar varios apartados clave.'};
  return {label:'Dominado', cls:'mastery-badge mastery-high', text:'El bloque está bien consolidado. Puedes pasar al siguiente o practicar solo los errores si quieres afinar.'};
}
function dominantReviewText(id) {
  const areas = getReviewAreas(id);
  if (!areas.length) return 'No hay errores registrados en este bloque.';
  if (areas.length === 1) return 'Has fallado principalmente en: ' + areas[0] + '.';
  return 'Has fallado principalmente en: ' + areas[0] + ' y ' + areas[1] + '.';
}
function startFailedPractice(id) {
  const incorrect = getIncorrectQuestions(id);
  if (!incorrect.length) { alert('No hay preguntas falladas en este bloque.'); return; }
  const b = getBlock(id);
  state.practiceMode = {active:true, blockId:id, indices: incorrect.map(x => x.index)};
  if(state.practiceMode && state.practiceMode.blockId === id) state.practiceMode = null;
  state.answers[id] = Array(b.questions.length).fill(null);
  state.checked[id] = false;
  state.startedAt[id] = Date.now();
  state.finishedAt[id] = null;
  state.activeTab = id;
  saveState();
  render();
}

    right += '<div class="mastery-box"><div class="mastery-title">Diagnóstico automático</div><div style="margin-bottom:8px"><span class="' + mastery.cls + '">' + mastery.label + '</span></div><div>' + mastery.text + '</div><div style="margin-top:8px;font-weight:700">' + dominantReviewText(b.id) + '</div></div>';
    right += blockReportHTML(b.id);

function checkBlock(id) {
  state.checked[id] = true;
  if(!state.finishedAt[id]) state.finishedAt[id] = Date.now();
  saveState();
  render();
}
function resetBlock(id) {
  const b = getBlock(id);
  if(state.practiceMode && state.practiceMode.blockId === id) state.practiceMode = null;
  state.answers[id] = Array(b.questions.length).fill(null);
  state.checked[id] = false;
  state.startedAt[id] = null;
  state.finishedAt[id] = null;
  saveState();
  render();
}
function resetAll() {
  state = clone(initialState);
  saveState();
  render();
}
function exportCSV() {
  const rows = [["Bloque","Puntuación","Total","Porcentaje","Respondidas","Corregido","Tiempo"]];
  blocks.forEach((b, i) => {
    const sc = scoreBlock(b.id);
    const start = state.startedAt[b.id];
    const end = state.finishedAt[b.id] || Date.now();
    rows.push(["Bloque " + (i+1) + " - " + b.title, sc, b.questions.length, pct(sc, b.questions.length) + "%", answeredCount(b.id), state.checked[b.id] ? "Sí" : "No", start ? fmt(end-start) : "00:00"]);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'resultados_digitalizacion.csv'; a.click();
  URL.revokeObjectURL(url);
}

  if(state.activeTab === 'results') {
    blockView.classList.add('hidden');
    resultsView.classList.remove('hidden');
    renderResults();
  } else {
    resultsView.classList.add('hidden');
    blockView.classList.remove('hidden');
    renderBlock();
  }
}
function renderTabs() {
  tabsEl.innerHTML = '';
  [...blocks.map(b => [b.id, b.short]), ['results', 'Resultados']].forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (state.activeTab === id ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      state.activeTab = id;
      if(id !== 'results') ensureStarted(id);
      saveState();
      render();
    };
    tabsEl.appendChild(btn);
  });
}
function renderMiniSummary() {
  summaryMini.innerHTML = '';
  blocks.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'stat';
    el.innerHTML = '<div class="k">B' + (i+1) + '</div><div class="v">' + scoreBlock(b.id) + '/' + b.questions.length + '</div><div class="s">' + (state.checked[b.id] ? 'Corregido' : answeredCount(b.id) + ' respondidas') + '</div>';
    summaryMini.appendChild(el);
  });
}
render();
setInterval(() => {
  if(state.activeTab !== 'results' && !state.checked[state.activeTab]) {
    const t = document.getElementById('timerDisplay');
    if(t) t.textContent = 'Tiempo: ' + fmt(remainingMs(state.activeTab));
  }
}, 1000);
</script>
</body>
</html>
